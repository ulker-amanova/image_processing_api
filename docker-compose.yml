version: "3.9"
services:
  app:
    build: .
    image: image-processing-service:latest
    container_name: image-processing-service
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - JWT_SECRET=supersecret
      - MAX_SOURCE_SIZE=52428800
      - MAX_OUTPUT_WIDTH=1400
      - MAX_OUTPUT_HEIGHT=1400
      - CACHE_TTL=5m
    depends_on:
      - redis
      - postgres
      - promtail

  redis:
    image: redis:7-alpine
    container_name: image-processing-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:15-alpine
    container_name: image-processing-postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=image_service
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    container_name: image-processing-prometheus
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - app

  loki:
    image: grafana/loki:2.9.11
    container_name: image-processing-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./config/loki.yaml:/etc/loki/local-config.yaml
    ports:
      - "3100:3100"

  promtail:
    image: grafana/promtail:2.9.11
    container_name: image-processing-promtail
    volumes:
      - ./config/promtail.yaml:/etc/promtail/promtail.yaml
      - /var/log:/var/log
    command: -config.file=/etc/promtail/promtail.yaml

  grafana:
    image: grafana/grafana:10.0.0
    container_name: image-processing-grafana
    ports:
      - "3000:3000"
    volumes:
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    depends_on:
      - prometheus
      - loki

  traefik:
    image: traefik:v3.0
    container_name: image-processing-traefik
    command:
      - --providers.file.filename=/etc/traefik/traefik.yml
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8081:8080"
    volumes:
      - ./config/traefik.yml:/etc/traefik/traefik.yml

volumes:
  redis-data:
  pgdata:
